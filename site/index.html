<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 CSV Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <main>
    <h1>ESP32 CSV Dashboard</h1>
    <p>Simple graph demo using CSV files from the ESP32.</p>

    <section class="card">
      <h2>Temperature</h2>
      <p id="temperatureValue">Loading...</p>
      <canvas id="temperatureChart" width="600" height="250"></canvas>
    </section>

    <section class="card">
      <h2>RGB Color Sensor</h2>
      <p id="colorValue">Loading...</p>
      <canvas id="colorChart" width="600" height="250"></canvas>
    </section>
  </main>
</body>
</html>
